<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Time Clock</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%23ff4422' stroke-width='2.5'/%3E%3Cline x1='16' y1='16' x2='16' y2='9' stroke='%23ff4422' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='16' x2='21' y2='16' stroke='%23ff4422' stroke-width='2.5' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%23ff4422'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Time Clock</h1>
    <div class="header-actions">
      <button class="settings-btn" id="settingsBtn" aria-label="Settings">&#9881;</button>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <div class="form">
    <div class="form-row">
      <div>
        <label for="start">Start</label>
        <input type="datetime-local" id="start">
      </div>
      <div>
        <label for="end">End</label>
        <input type="datetime-local" id="end">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label for="preset">Preset</label>
        <select id="preset">
          <option value="">Personalizado...</option>
          <option>Correção de Bugs</option>
          <option>Reunião</option>
          <option>Revisão de Código</option>
          <option>Documentação</option>
        </select>
      </div>
      <div>
        <label for="description">Description</label>
        <input type="text" id="description" placeholder="What did you work on?">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="submitBtn">Add</button>
      <button class="btn-secondary" id="cancelBtn" style="display:none">Cancel</button>
    </div>
  </div>

  <div class="filter-bar">
    <label for="monthFilter">Period</label>
    <select id="monthFilter" class="filter-select">
      <option value="">All months</option>
    </select>
  </div>

  <div class="list-header">
    <div class="list-header-left">
      <h2 id="listSummary">Entries (0 total)</h2>
      <button class="btn-secondary btn-sm" id="selectAllBtn" data-state="select">Select All</button>
    </div>
    <div class="hamburger">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">&#9776;</button>
      <div class="hamburger-menu" id="hamburgerMenu">
        <button class="hamburger-item" data-action="exportJson">Export as JSON</button>
        <button class="hamburger-item" data-action="exportCsv">Export as CSV</button>
        <button class="hamburger-item" data-action="email">Email Selected</button>
        <button class="hamburger-item" data-action="import">Import...</button>
      </div>
    </div>
  </div>
  <div class="entries" id="entryList"></div>

  <input type="file" id="importFile" accept=".json" style="display:none">
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsOverlay">
  <div class="modal" id="settingsModal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="btn-icon" id="closeSettingsBtn" aria-label="Close">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="config-field">
        <label for="cfgName">Name</label>
        <input type="text" id="cfgName">
      </div>
      <div class="config-field">
        <label for="cfgCode">Code</label>
        <input type="text" id="cfgCode">
      </div>
      <div class="config-field">
        <label for="cfgTo">To</label>
        <input type="email" id="cfgTo">
      </div>
      <div class="config-field">
        <label>CC</label>
        <div id="ccList"></div>
        <button class="btn-secondary btn-sm" id="addCcBtn">+ Add CC</button>
      </div>
      <div class="config-actions">
        <button class="btn-primary" id="saveConfigBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Time Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Time Clock</h1>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
  </header>

  <div class="form">
    <div class="form-row">
      <div>
        <label for="start">Start</label>
        <input type="datetime-local" id="start">
      </div>
      <div>
        <label for="end">End</label>
        <input type="datetime-local" id="end">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label for="preset">Preset</label>
        <select id="preset">
          <option value="">Custom...</option>
          <option>Bug fixes</option>
          <option>Meetings</option>
          <option>Code review</option>
          <option>Documentation</option>
          <option>Deployment</option>
          <option>Other</option>
        </select>
      </div>
      <div>
        <label for="description">Description</label>
        <input type="text" id="description" placeholder="What did you work on?">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="submitBtn">Add</button>
      <button class="btn-secondary" id="cancelBtn" style="display:none">Cancel</button>
    </div>
  </div>

  <div class="list-header">
    <h2 id="listSummary">Entries (0 total)</h2>
  </div>
  <div class="entries" id="entryList"></div>

  <div class="footer">
    <button class="btn-primary" id="exportBtn">Export JSON</button>
    <button class="btn-secondary" id="importBtn">Import...</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
